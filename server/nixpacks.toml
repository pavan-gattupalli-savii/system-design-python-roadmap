# Nixpacks build config for Railway
# Without this, Railway sets NODE_ENV=production and Nixpacks runs
# `npm ci --omit=dev`, which skips devDependencies (including typescript).
# tsc is then missing and the build fails with exit code 127.

[phases.install]
cmds = ["npm ci"]           # installs ALL deps (devDeps included), ignores NODE_ENV

[phases.build]
cmds = ["npm run build"]    # runs `tsc` — now available because typescript is in devDeps

# NOTE: do NOT add [phases.start] — Nixpacks treats it as a Docker RUN during
# the image build, not the container start command.
# The start command is defined in railway.toml [deploy] startCommand.

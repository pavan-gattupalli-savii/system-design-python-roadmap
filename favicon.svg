<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- System design node graph: 4 outer nodes + 1 center hub -->
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.8" fill="white"/>
  <!-- Top node -->
  <circle cx="16" cy="6" r="2.8" fill="white" opacity="0.85"/>
  <!-- Left node -->
  <circle cx="6" cy="16" r="2.8" fill="white" opacity="0.85"/>
  <!-- Right node -->
  <circle cx="26" cy="16" r="2.8" fill="white" opacity="0.85"/>
  <!-- Bottom node -->
  <circle cx="16" cy="26" r="2.8" fill="white" opacity="0.7"/>
  <!-- Connecting lines -->
  <line x1="16" y1="8.8" x2="16" y2="12.2" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="8.8" y1="16" x2="12.2" y2="16" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="19.8" y1="16" x2="23.2" y2="16" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="19.8" x2="16" y2="23.2" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
</svg>

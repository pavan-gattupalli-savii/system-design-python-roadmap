<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>System Design Roadmap</title>
  <!--
    GitHub Pages SPA redirect:
      GH Pages serves this file for any unknown path. We rewrite the URL so
      the SPA can handle it client-side once index.html boots.
    Source: https://github.com/rafgraph/spa-github-pages
  -->
  <script type="text/javascript">
    (function () {
      // Number of leading path segments to keep before the SPA route.
      // For https://<user>.github.io/<repo>/foo/bar  => keep 1 (the repo).
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body>
  Redirecting…
</body>
</html>
